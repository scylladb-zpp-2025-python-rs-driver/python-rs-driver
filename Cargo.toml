[package]
name = "scylla"
version = "0.1.0"
edition = "2024"

[lib]
name = "scylla"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.25.1", features = ["extension-module", "experimental-async", "bigdecimal", "num-bigint", "uuid", "chrono", "time"] }
#scylla = "1.3.1"
scylla = { git = "https://github.com/paulinaczajkowska/scylla-rust-driver", branch = "main", features = ["chrono-04", "bigdecimal-04", "num-bigint-04", "time-03"]}
tokio = { version = "1.42.0", features = ["full"] }
thiserror = "2.0.6"
uuid = { version = "1.11.0", features = ["v4"] }
scylla-cql = { git = "https://github.com/paulinaczajkowska/scylla-rust-driver", branch = "main" , features = ["chrono-04", "bigdecimal-04", "num-bigint-04", "time-03" ]}
bigdecimal-04 = { package = "bigdecimal", version = "0.4" }
chrono_04 = { package = "chrono", version = "0.4" }
num-bigint-04 = { package = "num-bigint", version = "0.4" }
time_03 = { package = "time", version = "0.3" }