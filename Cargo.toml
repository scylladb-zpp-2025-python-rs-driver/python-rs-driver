[package]
name = "scylla"
version = "0.1.0"
edition = "2024"

[lib]
name = "scylla"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.25.1", features = ["extension-module", "experimental-async"] }
#scylla = "1.3.1"
scylla = { git = "https://github.com/paulinaczajkowska/scylla-rust-driver", branch = "main" }
tokio = { version = "1.42.0", features = ["full"] }
thiserror = "2.0.6"
uuid = { version = "1.11.0", features = ["v4"] }
#scylla-cql = "1.3.1"
scylla-cql = { git = "https://github.com/paulinaczajkowska/scylla-rust-driver", branch = "main" }