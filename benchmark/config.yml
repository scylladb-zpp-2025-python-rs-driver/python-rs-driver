backends:
  - name: Python-RS
    benchmark-name: insert
    build-command: "true"
    run-command: uv run python insert.py

  - name: Python-RS
    benchmark-name: serialization
    build-command: "true"
    run-command: uv run python ser.py

  - name: Python-RS
    benchmark-name: deserialization
    build-command: "true"
    run-command: uv run python deser.py

  - name: Python-RS
    benchmark-name: batch
    build-command: "true"
    run-command: uv run python batch.py

  - name: Python-RS
    benchmark-name: paging
    build-command: "true"
    run-command: uv run python paging.py

  - name: Python-RS
    benchmark-name: select-small
    build-command: "true"
    run-command: uv run python small_select.py

  - name: Python-RS
    benchmark-name: select-large
    build-command: "true"
    run-command: uv run python large_select.py

  - name: python-RS-concurrent
    benchmark-name: concurrent-insert
    build-command: "true"
    run-command: uv run python concurrent_insert.py

  - name: python-RS-concurrent
    benchmark-name: concurrent-select
