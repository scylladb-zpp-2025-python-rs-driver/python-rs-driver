benchmarks:
  - name: insert
    starting-step: 1000
    no-steps: 3
    step-progress: 5000
    progress-type: additive

  - name: complex-insert
    starting-step: 1000
    no-steps: 3
    step-progress: 5000
    progress-type: additive

  - name: complex-select
    starting-step: 100
    no-steps: 3
    step-progress: 500
    progress-type: additive

  - name: batch
    starting-step: 1000
    no-steps: 3
    step-progress: 5000
    progress-type: additive

  - name: paging
    starting-step: 100
    no-steps: 3
    step-progress: 500
    progress-type: additive

  - name: select-small
    starting-step: 1000
    no-steps: 3
    step-progress: 5000
    progress-type: additive

  - name: select-large
    starting-step: 100
    no-steps: 3
    step-progress: 500
    progress-type: additive

  - name: concurrent-insert
    starting-step: 1000
    no-steps: 3
    step-progress: 5000
    progress-type: additive

  - name: concurrent-select
    starting-step: 1000
    no-steps: 3
    step-progress: 5000
    progress-type: additive

  - name: concurrent-complex-insert
    starting-step: 1000
    no-steps: 3
    step-progress: 5000
    progress-type: additive

  - name: concurrent-complex-select
    starting-step: 1000
    no-steps: 3
    step-progress: 5000
    progress-type: additive

  - name: concurrent-paging
    starting-step: 1000
    no-steps: 3
    step-progress: 5000
    progress-type: additive

backends:
  - name: Python-RS
    benchmark-name: insert
    build-command: "env PYTHONPATH=. uv run python set-up/set_up_insert.py"
    run-command: env PYTHONPATH=. uv run python python-rs-driver/insert.py

  - name: Python-Driver
    benchmark-name: insert
    build-command: "env PYTHONPATH=. uv run python set-up/set_up_insert.py"
    run-command: env PYTHONPATH=. uv run python python-driver/insert.py

  - name: Python-RS
    benchmark-name: complex-insert
    build-command: "env PYTHONPATH=. uv run python set-up/set_up_complex_insert.py"
    run-command: env PYTHONPATH=. uv run python python-rs-driver/complex_insert.py

  - name: Python-Driver
    benchmark-name: complex-insert
    build-command: "env PYTHONPATH=. uv run python set-up/set_up_complex_insert.py"
    run-command: env PYTHONPATH=. uv run python python-driver/complex_insert.py

  - name: Python-RS
    benchmark-name: complex-select
    build-command: "env PYTHONPATH=. uv run python set-up/set_up_complex_select.py 10"
    run-command: env PYTHONPATH=. uv run python python-rs-driver/complex_select.py 10

