    progress-type: additive

  - name: concurrent-insert
    starting-step: 1000
    no-steps: 3
    step-progress: 5000
    progress-type: additive

  - name: concurrent-select
    starting-step: 1000
    no-steps: 3
    step-progress: 5000
    progress-type: additive

  - name: concurrent-serialization
    starting-step: 1000
    no-steps: 3
    step-progress: 5000
