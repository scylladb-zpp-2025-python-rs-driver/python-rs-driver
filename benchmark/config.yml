    starting-step: 1000
    no-steps: 3
    step-progress: 5000
    progress-type: additive

  - name: serialization
    starting-step: 1000
    no-steps: 3
    step-progress: 5000
    progress-type: additive

  - name: deserialization
    starting-step: 100
    no-steps: 3
    step-progress: 500
    progress-type: additive

  - name: batch
    starting-step: 1000
    no-steps: 3
    step-progress: 5000
    progress-type: additive

  - name: paging
    starting-step: 100
    no-steps: 3
    step-progress: 500
    progress-type: additive

  - name: select-small
    starting-step: 1000
    no-steps: 3
